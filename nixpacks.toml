[phases.setup]
nixPkgs = ["python311", "gcc", "playwright-driver"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/python -m playwright install --with-deps chromium"
]

[start]
cmd = "/opt/venv/bin/gunicorn --workers 2 --bind 0.0.0.0:3000 app:app"